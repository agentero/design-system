name: Publish

on:
  push:
    branches: [master]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: '📦 Publish to npm'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: npm
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: '📥 Checkout'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: '🟢 Setup Node'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org
      - name: '💾 Cache dependencies'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: '📦 Install dependencies'
        run: yarn install --frozen-lockfile
      - name: '🔍 Detect version bump type'
        id: bump
        run: |
          if git diff --name-only --diff-filter=A HEAD~1 -- 'src/*/index.ts' 'src/*/index.tsx' | grep -q .; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi
      - name: '🔖 Bump version'
        id: version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: '🏗️ Build'
        run: yarn build
      - name: '🚀 Publish'
        run: npm publish --provenance --access public
        working-directory: dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: '📝 Commit version bump'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin master --tags
